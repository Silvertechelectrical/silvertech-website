<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Silvertech</title>
    <meta name="description" content="Sign in to Silvertech for secure downloads, service requests, and developer access protected by Firebase authentication.">
    <meta property="og:title" content="Silvertech Login">
    <meta property="og:description" content="Sign in to Silvertech for secure downloads, service requests, and developer access.">
    <meta property="og:image" content="../assets/img/silvertech_logo.ico">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/x-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="apple-touch-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="stylesheet" href="../assets/css/style.css?v=20260702">
</head>
<body>
    <nav class="top-nav">
        <a class="brand" href="../index.html">
            <span class="brand-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" aria-hidden="true">
                    <path d="M3 11.5 12 4l9 7.5"></path>
                    <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"></path>
                    <path d="M9 21V12h6v9"></path>
                </svg>
            </span>
            <span>Silvertech</span>
        </a>
        <div class="nav-links">
            <a class="nav-link-pill" href="services.html">Services</a>
            <a class="nav-link-pill" href="shop.html">Shop</a>
            <a class="nav-link-pill" href="store.html">Store</a>
        </div>
    </nav>

    <main class="page-shell">
        <section class="auth-card">
            <h1>Silvertech Access</h1>
            <p class="small">Secure login for downloads, account history, and premium access.</p>
            <form>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <label class="checkbox-container" for="show-password-toggle">
                    <input type="checkbox" id="show-password-toggle">
                    <span>Show password</span>
                </label>
                <button type="button" id="loginBtn">Sign In</button>
                <button type="button" id="registerBtn" class="btn btn-secondary">Create Account</button>
                <div class="divider-row" aria-hidden="true">
                    <span></span>
                    <span>or</span>
                    <span></span>
                </div>
                <button type="button" id="googleLoginBtn" class="google-btn">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/copy_of_24dp.svg" alt="Google logo" width="18" height="18">
                    Continue with Google
                </button>
                <button type="button" id="deleteAccountBtn" class="btn btn-secondary hidden">Delete Account</button>
            </form>
            <p id="status-message" class="status-message"></p>
        </section>
    </main>

    <script src="../js/load-firebase-config.js?v=20260708"></script>
    <script src="../js/register-sw.js?v=20260708"></script>
    <script type="module" src="../js/firebase-init.js?v=20260708"></script>
    <script type="module" src="../js/auth-nav.js?v=20260708"></script>
    <script type="module" src="../js/auth.js?v=20260708"></script>
</body>
</html>

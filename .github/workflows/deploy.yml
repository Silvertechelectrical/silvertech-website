name: Deploy to GitHub Pages

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare `public/` folder and copy site files
        run: |
          rm -rf public
          mkdir -p public public/js
          cp -a index.html assets js pages manifest.json sw.js public/
          cp -a .nojekyll public/.nojekyll 2>/dev/null || touch public/.nojekyll

      - name: Generate firebase-config.js from secrets (written to `public/`)
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          mkdir -p public
          cat > ./public/firebase-config.js <<EOFCONFIG
          window.FIREBASE_CONFIG = {
            apiKey: "${FIREBASE_API_KEY:-}",
            authDomain: "${FIREBASE_AUTH_DOMAIN:-}",
            projectId: "${FIREBASE_PROJECT_ID:-}",
            storageBucket: "${FIREBASE_STORAGE_BUCKET:-}",
            messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID:-}",
            appId: "${FIREBASE_APP_ID:-}"
          };
          EOFCONFIG
          cp ./public/firebase-config.js ./public/js/firebase-config.js

      - name: Generate cloudinary-config.js from secrets when available
        if: ${{ env.CLOUDINARY_CLOUD_NAME != '' }}
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
        run: |
          cat > ./public/cloudinary-config.js <<EOFCONFIG
          window.CLOUDINARY_CONFIG = {
            cloudName: "${CLOUDINARY_CLOUD_NAME}",
            uploadPreset: "${CLOUDINARY_UPLOAD_PRESET}"
          };
          EOFCONFIG
          cp ./public/cloudinary-config.js ./public/js/cloudinary-config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages

      - name: Ensure GitHub Pages source is set to gh-pages root
        run: |
          curl -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Silvertech</title>
    <meta name="description" content="Explore the Silvertech shop, request purchases, and access digital assets backed by Firebase authentication and secure Firestore workflows.">
    <meta property="og:title" content="Silvertech Shop">
    <meta property="og:description" content="Explore the Silvertech shop, request purchases, and access digital assets backed by Firebase authentication.">
    <meta property="og:image" content="../assets/img/silvertech_logo.ico">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/x-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="apple-touch-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <a class="brand" href="../index.html">
            <span class="brand-icon icon icon-home"></span>
            <span>Silvertech</span>
        </a>
        <div class="nav-links">
            <a class="nav-link-pill" href="services.html">Services</a>
            <a class="nav-link-pill" href="shop.html">Shop</a>
            <a class="nav-link-pill" href="silverstore.html">Store</a>
            <a class="btn btn-outline" href="login.html">Login</a>
        </div>
    </nav>

    <main class="page-shell">
        <section class="page-hero">
            <div class="hero-actions">
                <a class="btn btn-secondary hidden" id="shop-manage-button" href="shop-management.html">Add Item</a>
            </div>
            <h1>Silvertech Shop</h1>
            <p>Browse and purchase premium digital assets, templates, and field-ready resources.</p>
            <div class="search-shell">
                <span class="search-icon" aria-hidden="true">🔎</span>
                <input id="shop-search" class="search-bar" type="text" placeholder="Search items...">
            </div>
        </section>

        <section id="shop-items" class="services-grid"></section>

    </main>

    <div id="purchase-drawer" class="purchase-drawer" aria-hidden="true">
        <div class="purchase-drawer-backdrop" data-close-drawer></div>
        <div class="purchase-drawer-content">
            <button type="button" class="drawer-close" data-close-drawer aria-label="Close purchase drawer">✕</button>
            <section id="purchase-panel" class="request-panel">
                <h2>Purchase Item</h2>
                <p>Select an item and provide your contact details.</p>
                <form id="purchase-form">
                    <label class="small" for="purchase-item-name">Item</label>
                    <select id="purchase-item-name" title="Select an item" required>
                        <option value="">Select an item</option>
                    </select>
                    <input id="purchase-email" type="email" placeholder="Your email" required>
                    <input id="purchase-phone" type="tel" placeholder="Your phone number" required>
                    <button type="submit">Request Purchase</button>
                </form>
                <p id="purchase-status" class="status-message"></p>
            </section>
        </div>
    </div>

    <script src="../js/load-firebase-config.js"></script>
    <script src="../js/register-sw.js"></script>
    <script type="module" src="../js/firebase-init.js"></script>
    <script type="module" src="../js/auth-nav.js"></script>
    <script type="module" src="../js/shop.js"></script>
</body>
</html>

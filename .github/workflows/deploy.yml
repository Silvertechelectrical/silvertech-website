name: Deploy to GitHub Pages

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare public folder
        run: |
          rm -rf public
          mkdir -p public
          cp -a index.html assets js pages public/
          touch public/.nojekyll

      - name: Generate firebase-config.js from secrets
        run: |
          cat > ./public/firebase-config.js <<'EOFCONFIG'
          window.FIREBASE_CONFIG = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}"
          };
          EOFCONFIG

      - name: Generate cloudinary-config.js from secrets when available
        if: ${{ env.CLOUDINARY_CLOUD_NAME }}
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
        run: |
          cat > ./public/cloudinary-config.js <<'EOFCONFIG'
          window.CLOUDINARY_CONFIG = {
            cloudName: "${CLOUDINARY_CLOUD_NAME}",
            uploadPreset: "${CLOUDINARY_UPLOAD_PRESET}"
          };
          EOFCONFIG

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages

      - name: Ensure GitHub Pages source is set to gh-pages root
        uses: actions/github-script@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = await github.rest.pages.updateInformationForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              source: { branch: 'gh-pages', path: '/' }
            });
            console.log('Updated Pages source:', response.data.source);

      - name: Confirm GitHub Pages site settings
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const site = await github.rest.pages.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            console.log('Pages URL:', site.data.html_url);
            console.log('Pages source:', JSON.stringify(site.data.source));
            console.log('Pages status:', site.data.status);

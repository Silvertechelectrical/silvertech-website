<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Developer | Silvertech</title>
    <meta name="description" content="Apply to become a developer or approve developer applications for the Silvertech store.">
    <meta property="og:title" content="Silvertech Verify Developer">
    <meta property="og:description" content="Developer approval and application management for Silvertech.">
    <meta property="og:image" content="../assets/img/silvertech_logo.ico">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/x-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="apple-touch-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="stylesheet" href="../assets/css/style.css?v=20260702">
</head>
<body>
    <nav class="top-nav">
        <a class="brand" href="../index.html">
            <span class="brand-icon icon icon-home"></span>
            <span>Silvertech</span>
        </a>
        <div class="nav-links">
            <a class="nav-link-pill" href="services.html">Services</a>
            <a class="nav-link-pill" href="shop.html">Shop</a>
            <a class="nav-link-pill" href="store.html">Store</a>
            <a class="btn btn-primary nav-login-btn" href="login.html">Login</a>
        </div>
    </nav>

    <main class="page-shell">
        <section class="page-hero">
            <h1>Developer Verification</h1>
            <p>Apply to become an approved developer or review pending developer applications.</p>
            <div id="verify-status-banner" class="status-banner hidden" role="status"></div>
        </section>

        <section id="developer-application-shell" class="auth-card hidden">
            <h2>Apply as a Developer</h2>
            <p class="small">Log in and submit your information to request approval. The admin will review your application.</p>
            <form id="developer-application-form">
                <label class="small" for="application-name">Full Name *</label>
                <input id="application-name" type="text" placeholder="Your full name" required>
                <label class="small" for="application-email">Email *</label>
                <input id="application-email" type="email" placeholder="you@example.com" required>
                <label class="small" for="application-phone">Phone Number *</label>
                <input id="application-phone" type="tel" placeholder="Phone number" required>
                <label class="small" for="application-reference">Payment Reference *</label>
                <input id="application-reference" type="text" placeholder="Mpesa reference" required>
                <button type="submit">Submit Application</button>
                <p id="application-status" class="status-message"></p>
            </form>
        </section>

        <section id="developer-approval-shell" class="panel hidden">
            <h2>Pending Developer Applications</h2>
            <div id="developer-applications-list" class="services-grid"></div>
        </section>
    </main>

    <script src="../js/load-firebase-config.js"></script>
    <script src="../js/register-sw.js"></script>
    <script type="module" src="../js/firebase-init.js"></script>
    <script type="module" src="../js/auth-nav.js"></script>
    <script type="module" src="../js/store-verify-developer.js"></script>
</body>
</html>

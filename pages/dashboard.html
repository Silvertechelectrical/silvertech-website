<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Silvertech</title>
    <meta name="description" content="Check your Silvertech account, activity history, and sign out of Firebase-protected access.">
    <meta property="og:title" content="Silvertech Dashboard">
    <meta property="og:description" content="Check your Silvertech account, activity history, and sign out of Firebase-protected access.">
    <meta property="og:image" content="../assets/img/silvertech_logo.ico">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/x-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="apple-touch-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <a class="brand" href="../index.html">
            <span class="brand-icon icon icon-home"></span>
            <span>Silvertech</span>
        </a>
        <div class="nav-links">
            <a class="nav-link-pill" href="services.html">Services</a>
            <a class="nav-link-pill" href="shop.html">Shop</a>
            <a class="nav-link-pill" href="silverstore.html">Store</a>
            <a class="btn btn-outline" href="login.html">Login</a>
        </div>
    </nav>

    <main class="page-shell">
        <section class="page-hero">
            <h1>My Account</h1>
            <p id="auth-status">Guest access</p>
        </section>

        <section class="panel">
            <h2>Recent Activity</h2>
            <div id="history-list" class="history-list"></div>
        </section>

        <section class="panel">
            <h2>Subscription Status</h2>
            <p>Active • Premium access enabled</p>
            <button id="logoutBtn">Sign Out</button>
        </section>
    </main>

    <script src="../js/load-firebase-config.js"></script>
    <script src="../js/register-sw.js"></script>
    <script type="module" src="../js/firebase-init.js"></script>
    <script type="module" src="../js/auth-nav.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script>
        const historyList = document.getElementById('history-list');
        const history = JSON.parse(localStorage.getItem('silvertech-history') || '[]');
        if (history.length) {
            historyList.innerHTML = history.map((item) => `<div class="history-item"><strong>${item.name}</strong><br><span class="small">${item.type} • ${item.at}</span></div>`).join('');
        } else {
            historyList.innerHTML = '<p class="small">No activity yet. Request a service or open the store to begin.</p>';
        }
    </script>
</body>
</html>

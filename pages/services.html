<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Silvertech</title>
    <meta name="description" content="Browse Silvertech services, request support, and access secure electrical and telecom offerings with Firebase-powered login.">
    <meta property="og:title" content="Silvertech Services">
    <meta property="og:description" content="Browse Silvertech services, request support, and access secure electrical and telecom offerings.">
    <meta property="og:image" content="../assets/img/silvertech_logo.ico">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/x-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="apple-touch-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="stylesheet" href="../assets/css/style.css?v=20260702">
</head>
<body>
    <nav class="top-nav">
        <a class="brand" href="../index.html">
            <span class="brand-icon icon icon-home"></span>
            <span>Silvertech</span>
        </a>
        <div class="nav-links">
            <a class="nav-link-pill" href="services.html">Services</a>
            <a class="nav-link-pill" href="shop.html">Shop</a>
            <a class="nav-link-pill" href="store.html">Store</a>
        </div>
    </nav>

    <main class="page-shell">
        <section class="page-hero">
            <div class="hero-actions">
                <button class="btn btn-secondary hidden admin-only" id="services-add-toggle">+ Add Service</button>
            </div>
            <h1>Professional Services</h1>
            <p>Search by category or request a consultation for premium field support.</p>
            <div class="search-shell">
                <span class="search-icon" aria-hidden="true">🔎</span>
                <input id="service-search" class="search-bar" type="text" placeholder="Search services or categories">
            </div>
        </section>

        <section id="services-add-form" class="panel hidden admin-only">
            <h2>Add a New Service</h2>
            <form id="admin-service-form" class="admin-form-shell">
                <input id="service-name" placeholder="Service name" required>
                <label class="small" for="service-category">Category *</label>
                <select id="service-category" title="Service category" aria-label="Service category" required>
                    <option value="">Select category</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Telecom">Telecom</option>
                </select>
                <input id="service-price" type="number" placeholder="Price" required>
                <input id="service-delivery" placeholder="Delivery timeline (e.g. 2-3 business days)" required>
                <textarea id="service-description" placeholder="Service description"></textarea>
                <label class="small" for="service-images">Marketing images</label>
                <input id="service-images" type="file" accept="image/*" multiple>
                <label class="small">
                    <input id="service-featured" type="checkbox"> Feature this service on the homepage
                </label>
                <button type="submit">Save Service</button>
                <p id="admin-service-status" class="status-message"></p>
            </form>
        </section>

        <section id="services-list" class="services-grid"></section>

        <section class="request-panel">
            <h2>Submit a Service Request</h2>
            <p>Choose a service, add your phone number, and our team will contact you.</p>
            <form id="service-request-form" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="1e62f3dc-6a00-4cde-9d0a-058e1ebbb39a">
                <input type="hidden" name="from_name" value="Silvertech Service Request">
                <input type="hidden" name="to_email" value="silvertech3l3ctrical@gmail.com">
                <input type="hidden" name="subject" value="New Service Request from Silvertech Website">
                <input type="hidden" name="redirect" value="https://silvertechelectrical.github.io/silvertech-website/pages/services.html">
                
                <label class="small" for="request-service-name">Select a service</label>
                <select id="request-service-name" name="service" title="Select a service" required>
                    <option value="">Select a service</option>
                </select>
                
                <input type="text" id="request-name" name="name" placeholder="Your Full Name" required>
                <input type="email" id="request-email" name="email" placeholder="Your Email" required>
                <input id="request-phone" type="tel" name="phone" placeholder="Your phone number" required>
                <textarea id="request-details" name="message" placeholder="Additional service details (optional)"></textarea>
                
                <button type="submit">Send Request</button>
            </form>
            <p id="request-status" class="status-message"></p>
        </section>
    </main>

    <div id="service-drawer" class="purchase-drawer" aria-hidden="true">
        <div class="purchase-drawer-backdrop" data-close-drawer></div>
        <div class="purchase-drawer-content">
            <button type="button" class="drawer-close" data-close-drawer aria-label="Close details">✕</button>
            <div id="service-detail-shell"></div>
        </div>
    </div>

    <script src="../js/load-firebase-config.js?v=20260706"></script>
    <script src="../js/register-sw.js?v=20260706"></script>
    <script type="module" src="../js/firebase-init.js?v=20260706"></script>
    <script type="module" src="../js/auth-nav.js?v=20260706"></script>
    <script type="module" src="../js/services.js"></script>
</body>
</html>

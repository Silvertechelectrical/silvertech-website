<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Silvertech</title>
    <meta name="description" content="Check your Silvertech account, activity history, and sign out of Firebase-protected access.">
    <meta property="og:title" content="Silvertech Dashboard">
    <meta property="og:description" content="Check your Silvertech account, activity history, and sign out of Firebase-protected access.">
    <meta property="og:image" content="../assets/img/silvertech_logo.ico">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/x-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="apple-touch-icon" href="../assets/img/silvertech_logo.ico">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="stylesheet" href="../assets/css/style.css?v=20260702">
</head>
<body>
    <nav class="top-nav">
        <a class="brand" href="../index.html">
            <span class="brand-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" aria-hidden="true">
                    <path d="M3 11.5 12 4l9 7.5"></path>
                    <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"></path>
                    <path d="M9 21V12h6v9"></path>
                </svg>
            </span>
            <span>Silvertech</span>
        </a>
        <div class="nav-links">
            <a class="nav-link-pill" href="services.html">Services</a>
            <a class="nav-link-pill" href="shop.html">Shop</a>
            <a class="nav-link-pill" href="store/index.html">Store</a>
        </div>
    </nav>

    <main class="page-shell">
        <section class="page-hero">
            <h1>My Account</h1>
            <p id="auth-status">Guest access</p>
        </section>

        <section class="panel">
            <h2>Recent Activity</h2>
            <div id="history-list" class="history-list"></div>
        </section>

        <section class="panel">
            <h2>Subscription Status</h2>
            <p>Active • Premium access enabled</p>
            <button id="logoutBtn">Sign Out</button>
        </section>
    </main>

    <script src="../js/load-firebase-config.js?v=20260708"></script>
    <script src="../js/register-sw.js?v=20260708"></script>
    <script type="module" src="../js/firebase-init.js?v=20260708"></script>
    <script type="module" src="../js/auth-nav.js?v=20260708"></script>
    <script type="module" src="../js/auth.js?v=20260708"></script>
    <script>
        const historyList = document.getElementById('history-list');
        const history = JSON.parse(localStorage.getItem('silvertech-history') || '[]');
        historyList.textContent = '';
        if (history.length) {
            const fragment = document.createDocumentFragment();
            history.forEach((item) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';

                const strong = document.createElement('strong');
                strong.textContent = item.name || '';

                const dateText = document.createElement('span');
                dateText.className = 'small';
                dateText.textContent = `${item.type || ''} • ${item.at || ''}`;

                historyItem.appendChild(strong);
                historyItem.appendChild(document.createElement('br'));
                historyItem.appendChild(dateText);
                fragment.appendChild(historyItem);
            });
            historyList.appendChild(fragment);
        } else {
            const emptyMessage = document.createElement('p');
            emptyMessage.className = 'small';
            emptyMessage.textContent = 'No activity yet. Request a service or open the store to begin.';
            historyList.appendChild(emptyMessage);
        }
    </script>
</body>
</html>
